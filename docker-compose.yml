services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_WS_URL=ws://localhost:8000/ws
      - NEXT_PUBLIC_BACKEND_HTTP_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
